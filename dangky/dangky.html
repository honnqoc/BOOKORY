<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="dangky.css">
    <title>BOOKORY - Trang chủ</title>
</head>

<body>
    <header>
        <div class="header__container">
            <div class="header__logo">
                <a href="../trangchu/trangchu.html"><img src="../hinhanh/logo.png" alt="BOOKORY"></a>
            </div>

            <nav class="header__menu">
                <ul class="header__menu-items">
                    <li class="header__back-to-home">
                        <a href="../trangchu/trangchu.html">
                            <i class="fa-solid fa-home"></i>
                            <p>Trang chủ</p>
                        </a>
                    </li>
                    <li class="header__sanpham">
                        <a href="../sanpham/sanpham.html">
                            <i class="fa-solid fa-book"></i>
                            <p>Sản phẩm</p>
                        </a>
                    </li>
                    <li class="header__shopping-bag">
                        <a href="../giohang/giohang.html">
                            <i class="fa-solid fa-shopping-cart"></i>
                            <p>Giỏ hàng</p>
                        </a>
                    </li>
                    <li class="header__user">
                        <i class="fa-solid fa-user"></i>
                        <p>Tài khoản</p>
                        <div class="header__login">
                            <ul>
                                <li class="header__dangky">
                                    <a href="../dangky/dangky.html" 
                                    class="header__button header__button-dangky">Đăng ký</a>
                                </li>
                                <li class="header__dangnhap">
                                    <a href="../dangnhap/dangnhap.html"
                                        class="header__button header__button-dangnhap">Đăng nhập</a>
                                </li>
                            </ul>
                        </div>
                    </li>
                    <li class="hamburger__dangky">
                        <a href="../dangky/dangky.html">Đăng ký</a>
                    </li>
                    <li class="hamburger__dangnhap">
                        <a href="../dangnhap/dangnhap.html">Đăng nhập</a>
                    </li>
                </ul>
            </nav>
            <div class="header__hamburger">
                <i class="fa-solid fa-bars"></i>
                <i class="fa-solid fa-x"></i>
            </div>
        </div>
    </header>
    <main class="form-box">
        <h2>ĐĂNG KÝ</h2>
        <form class="form-dangky">
            <div class="input-group">
                <label>Họ và tên:</label>
                <input name="name" type="text" placeholder="Nhập họ và tên" required>
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input name="email" type="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label>Mật khẩu:</label>
                <input name="password" type="password" placeholder="Tối thiểu 8 ký tự" required>
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu:</label>
                <input name="confirm-password" type="password" placeholder="Nhập lại mật khẩu" required>
            </div>
            <div class="checkbox-group">
                Tôi đồng ý với <a href="">điều khoản dịch vụ:</a>
                <input name="agree" type="checkbox" required>
            </div>
            <button class="register-btn" type="submit">Đăng ký</button>
            <p class="text">
                Đã có tài khoản?
                <a href="../dangnhap/dangnhap.html">Đăng nhập ngay</a>
            </p>
        </form>
    </main>
    <footer class="footer">
        <p>&copy; 2026 BOOKORY. All rights reserved.</p>   
    </footer>
    <script src="xulidangky.js"></script>
    <script src="../trangchu/xulitrangchu.js"></script>
    <script src="../timkiem/xulitimkiem.js"></script>
</body>

</html>
