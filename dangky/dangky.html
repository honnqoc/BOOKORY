<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="dangky.css">
    <title>BOOKORY - Trang chủ</title>
</head>

<body>
    <header>
        <nav class="nav-container">
            <img class="logo" src="../hinhanh/logo.png">
            <ul>
                <li><a href="../sanpham/sanpham.html">Sản phẩm</a></li>
                <li><a href="../trangchu/trangchu.html">Trang chủ</a></li>
            </ul>
        </nav>
    </header>
    <div class="form-box">
        <h2>ĐĂNG KÝ</h2>
        <form>
            <div class="input-group">
                <label>Họ và tên:</label>
                <input name="name" type="text" placeholder="Nhập họ và tên" required>
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input name="email" type="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label>Mật khẩu:</label>
                <input name="password" type="password" placeholder="Tối thiểu 8 ký tự" required>
            </div>
            <div class="input-group">
                <label>Xác nhận mật khẩu:</label>
                <input name="confirm-password" type="password" placeholder="Nhập lại mật khẩu" required>
            </div>
            <div class="checkbox-group">
                Tôi đồng ý với <a href="">điều khoản dịch vụ:</a>
                <input name="agree" type="checkbox" required>
            </div>
            <button class="register-btn" type="submit">Đăng ký</button>
            <p class="text">
                Đã có tài khoản?
                <a href="../dangnhap/dangnhap.html">Đăng nhập ngay</a>
            </p>
        </form>
    </div>
    <footer class="footer">
        <p>&copy; 2026 BOOKORY. All rights reserved.</p>   
    </footer>
    <script src="xulidangky.js"></script>
</body>

</html>
