<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="giohang.css">
    <title>BOOKORY - Trang chủ</title>
</head>

<body>
    <header>
        <div class="header__container">
            <div class="header__logo">
                <a href="../trangchu/trangchu.html"><img src="../hinhanh/logo.png" alt="BOOKORY"></a>
            </div>

            <nav class="header__menu">
                <ul class="header__menu-items">
                    <li class="header__back-to-home">
                        <a href="../trangchu/trangchu.html">
                            <i class="fa-solid fa-home"></i>
                            <p>Trang chủ</p>
                        </a>
                    </li>
                    <li class="header__sanpham">
                        <a href="../sanpham/sanpham.html">
                            <i class="fa-solid fa-book"></i>
                            <p>Sản phẩm</p>
                        </a>
                    </li>
                    <li class="header__shopping-bag">
                        <a href="../giohang/giohang.html">
                            <i class="fa-solid fa-shopping-cart"></i>
                            <p>Giỏ hàng</p>
                        </a>
                    </li>
                    <li class="header__user">
                        <i class="fa-solid fa-user"></i>
                        <p>Tài khoản</p>
                        <div class="header__login">
                            <ul>
                                <li class="header__dangky">
                                    <a href="../dangky/dangky.html" 
                                    class="header__button header__button-dangky">Đăng ký</a>
                                </li>
                                <li class="header__dangnhap">
                                    <a href="../dangnhap/dangnhap.html"
                                        class="header__button header__button-dangnhap">Đăng nhập</a>
                                </li>
                            </ul>
                        </div>
                    </li>
                    <li class="hamburger__dangky">
                        <a href="../dangky/dangky.html">Đăng ký</a>
                    </li>
                    <li class="hamburger__dangnhap">
                        <a href="../dangnhap/dangnhap.html">Đăng nhập</a>
                    </li>
                </ul>
            </nav>
            <div class="header__hamburger">
                <i class="fa-solid fa-bars"></i>
                <i class="fa-solid fa-x"></i>
            </div>
        </div>
    </header>
    <main class="cart-main-container">
        <div class="cart-container">
            <div class="cart-header">
                <h1>GIỎ HÀNG  <i class="fa-solid fa-shopping-cart"></i></h1>
                <p class="quantity-in-cart">0</p>
            </div>
            <table class="cart-table">
                <thead class="table-head">
                    <tr>
                        <th>Tên sách</th>
                        <th>Ảnh minh họa</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Xóa sản phẩm</th>
                    </tr>
                </thead>
                <tbody class="table-body"></tbody>
                <tfoot class="table-foot"></tfoot>
            </table>
        </div>
        <form class="user-address-info">
            <h2>THÔNG TIN ĐẶT HÀNG</h2>
            <label for="name">Họ và tên:</label>
            <input type="text" id="name" name="name" placeholder="Nhập họ và tên của bạn" required><br><br>
            <label for="address">Địa chỉ:</label>
            <input type="text" id="address" name="address" placeholder="Nhập địa chỉ của bạn" required><br><br>
            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại của bạn" required><br><br>
            <button id="order-btn" type="submit">Xác nhận đặt hàng</button>
        </form>
        <script src="xuligiohang.js"></script>
        <script src="../trangchu/xulitrangchu.js"></script>
        <script src="../timkiem/xulitimkiem.js"></script>
    </main>
    <footer class="footer">
        <p>&copy; 2026 BOOKORY. All rights reserved.</p>   
    </footer>
</body>

</html>
