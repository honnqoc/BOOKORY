<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f2f3f7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            width: 380px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #4b4bb7;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4b4bb7;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #37379b;
        }

        .text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .text a {
            color: #4b4bb7;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="form-box">

        <h2>Đăng nhập</h2>

        <form>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Nhập email">
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>

            <button class="btn">Đăng nhập</button>

            <p class="text">
                Chưa có tài khoản?
                <a href="../dangky/dangky.html">Đăng ký</a>
            </p>

        </form>

    </div>

</body>

</html>
